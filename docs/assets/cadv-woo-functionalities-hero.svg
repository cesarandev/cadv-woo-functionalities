<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">CADV Woo Functionalities</title>
  <desc id="desc">Plugin comercial para WooCommerce con marketplace, CRM, fichas técnicas y WhatsApp.</desc>
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101d0c"/>
      <stop offset="0.55" stop-color="#203d18"/>
      <stop offset="1" stop-color="#315c27"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfdf9"/>
      <stop offset="1" stop-color="#eef5ea"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a8d36f" stop-opacity=".33"/>
      <stop offset="1" stop-color="#a8d36f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grain" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="1.2" fill="#fff" opacity=".12"/>
      <circle cx="17" cy="13" r=".8" fill="#fff" opacity=".09"/>
      <circle cx="8" cy="20" r=".7" fill="#fff" opacity=".08"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#081006" flood-opacity=".32"/>
    </filter>
  </defs>

  <rect width="1200" height="440" rx="28" fill="url(#hero-bg)"/>
  <rect width="1200" height="440" rx="28" fill="url(#grain)"/>
  <circle cx="1070" cy="90" r="270" fill="url(#glow)"/>
  <circle cx="980" cy="380" r="210" fill="url(#glow)" opacity=".55"/>

  <g transform="translate(70 66)">
    <rect width="66" height="66" rx="18" fill="#9acb63"/>
    <path d="M18 39c18-1 29-10 34-25 2 18-5 31-22 37-6 2-12-2-12-12Z" fill="#14260f"/>
    <path d="M25 49c5-14 13-23 25-29" fill="none" stroke="#14260f" stroke-width="4" stroke-linecap="round"/>
  </g>

  <text x="70" y="177" fill="#fff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="48" font-weight="800" letter-spacing="-1.4">CADV Woo Functionalities</text>
  <text x="70" y="220" fill="#cfe1c5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21">Operación comercial para WooCommerce, conectada de punta a punta.</text>

  <g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">
    <g transform="translate(70 272)">
      <rect width="138" height="42" rx="21" fill="#fff" opacity=".1" stroke="#fff" stroke-opacity=".16"/>
      <circle cx="22" cy="21" r="5" fill="#9acb63"/>
      <text x="36" y="27" fill="#fff">Marketplace</text>
    </g>
    <g transform="translate(222 272)">
      <rect width="112" height="42" rx="21" fill="#fff" opacity=".1" stroke="#fff" stroke-opacity=".16"/>
      <circle cx="22" cy="21" r="5" fill="#9acb63"/>
      <text x="36" y="27" fill="#fff">CRM</text>
    </g>
    <g transform="translate(348 272)">
      <rect width="170" height="42" rx="21" fill="#fff" opacity=".1" stroke="#fff" stroke-opacity=".16"/>
      <circle cx="22" cy="21" r="5" fill="#9acb63"/>
      <text x="36" y="27" fill="#fff">Fichas técnicas</text>
    </g>
    <g transform="translate(532 272)">
      <rect width="142" height="42" rx="21" fill="#fff" opacity=".1" stroke="#fff" stroke-opacity=".16"/>
      <circle cx="22" cy="21" r="5" fill="#9acb63"/>
      <text x="36" y="27" fill="#fff">WhatsApp</text>
    </g>
  </g>

  <text x="70" y="371" fill="#9fb592" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" letter-spacing="1.8">WORDPRESS · WOOCOMMERCE · ELEMENTOR READY</text>

  <g transform="translate(800 57)" filter="url(#shadow)">
    <rect x="28" y="24" width="278" height="340" rx="20" fill="#10200d" opacity=".35"/>
    <rect width="278" height="340" rx="20" fill="url(#card-bg)"/>
    <rect width="278" height="174" rx="20" fill="#4b792e"/>
    <rect y="154" width="278" height="20" fill="#4b792e"/>
    <rect width="278" height="174" rx="20" fill="url(#grain)" opacity=".4"/>
    <rect x="161" y="0" width="117" height="30" rx="0 20 0 10" fill="#31531f"/>
    <text x="219" y="20" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="800">NUTRICIÓN</text>
    <g transform="translate(88 24)">
      <path d="M25 8h52l-5 23 13 92c2 14-6 21-18 21H35c-12 0-20-7-18-21l13-92Z" fill="#fff" stroke="#d8e0d4" stroke-width="3"/>
      <path d="M30 31h42" stroke="#d8e0d4" stroke-width="3"/>
      <circle cx="51" cy="83" r="24" fill="#4b792e"/>
      <path d="M51 100c-2-18 6-30 21-35-2 17-9 29-21 35Zm-2-4c-11-5-17-14-18-28 13 5 19 14 18 28Z" fill="#fff"/>
    </g>
    <text x="22" y="211" fill="#182119" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="800">Producto destacado</text>
    <text x="22" y="239" fill="#6b776a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600">Fórmula especializada · Reg. ICA</text>
    <rect x="22" y="269" width="234" height="48" rx="9" fill="#4b792e"/>
    <text x="139" y="299" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">VER PRODUCTO</text>
  </g>
</svg>
