<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Flujo de solicitud de ficha técnica</title>
  <desc id="desc">El usuario solicita una ficha; el plugin valida, crea o vincula el cliente, genera permisos y registra la gestión en el CRM.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14260f"/>
      <stop offset="1" stop-color="#294c20"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0l10 5-10 5Z" fill="#a7c795"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#071006" flood-opacity=".25"/>
    </filter>
  </defs>

  <rect width="1200" height="430" rx="26" fill="url(#bg)"/>
  <text x="60" y="64" fill="#fff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="800">De la solicitud a la descarga</text>
  <text x="60" y="94" fill="#c7dbc0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">El plugin reutiliza clientes y permisos activos para evitar registros duplicados.</text>

  <g stroke="#a7c795" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M245 236H276"/>
    <path d="M465 236H496"/>
    <path d="M685 236H716"/>
    <path d="M905 236H936"/>
  </g>

  <g font-family="Inter,Segoe UI,Arial,sans-serif" filter="url(#shadow)">
    <g transform="translate(55 145)">
      <rect width="190" height="182" rx="18" fill="#fff"/>
      <circle cx="30" cy="30" r="16" fill="#4b792e"/>
      <text x="30" y="36" text-anchor="middle" fill="#fff" font-size="14" font-weight="900">1</text>
      <path d="M75 38h77M75 55h54" stroke="#d9e3d5" stroke-width="7" stroke-linecap="round"/>
      <rect x="28" y="84" width="134" height="42" rx="8" fill="#eaf2e6"/>
      <text x="95" y="110" text-anchor="middle" fill="#315c27" font-size="13" font-weight="800">FORMULARIO</text>
      <text x="95" y="150" text-anchor="middle" fill="#53614e" font-size="13">Datos B2B + privacidad</text>
    </g>

    <g transform="translate(276 145)">
      <rect width="190" height="182" rx="18" fill="#fff"/>
      <circle cx="30" cy="30" r="16" fill="#4b792e"/>
      <text x="30" y="36" text-anchor="middle" fill="#fff" font-size="14" font-weight="900">2</text>
      <circle cx="95" cy="91" r="32" fill="#eaf2e6"/>
      <circle cx="95" cy="82" r="10" fill="#4b792e"/>
      <path d="M73 110c5-16 39-16 44 0" fill="#4b792e"/>
      <text x="95" y="150" text-anchor="middle" fill="#53614e" font-size="13">Vincula o crea cliente</text>
    </g>

    <g transform="translate(496 145)">
      <rect width="190" height="182" rx="18" fill="#fff"/>
      <circle cx="30" cy="30" r="16" fill="#4b792e"/>
      <text x="30" y="36" text-anchor="middle" fill="#fff" font-size="14" font-weight="900">3</text>
      <rect x="63" y="64" width="64" height="70" rx="7" fill="#eaf2e6" stroke="#9fbe91"/>
      <path d="M78 84h34M78 100h34M78 116h22" stroke="#4b792e" stroke-width="5" stroke-linecap="round"/>
      <text x="95" y="158" text-anchor="middle" fill="#53614e" font-size="13">Pedido $0 completado</text>
    </g>

    <g transform="translate(716 145)">
      <rect width="190" height="182" rx="18" fill="#fff"/>
      <circle cx="30" cy="30" r="16" fill="#4b792e"/>
      <text x="30" y="36" text-anchor="middle" fill="#fff" font-size="14" font-weight="900">4</text>
      <circle cx="95" cy="96" r="35" fill="#eaf2e6"/>
      <path d="M95 72v35m0 0-15-15m15 15 15-15M73 119h44" fill="none" stroke="#4b792e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="95" y="158" text-anchor="middle" fill="#53614e" font-size="13">Permiso de descarga</text>
    </g>

    <g transform="translate(936 145)">
      <rect width="209" height="182" rx="18" fill="#fff"/>
      <circle cx="30" cy="30" r="16" fill="#4b792e"/>
      <text x="30" y="36" text-anchor="middle" fill="#fff" font-size="14" font-weight="900">5</text>
      <rect x="55" y="64" width="100" height="70" rx="10" fill="#eaf2e6"/>
      <rect x="70" y="80" width="14" height="38" rx="3" fill="#789d65"/>
      <rect x="94" y="92" width="14" height="26" rx="3" fill="#4b792e"/>
      <rect x="118" y="73" width="14" height="45" rx="3" fill="#315c27"/>
      <text x="105" y="158" text-anchor="middle" fill="#53614e" font-size="13">CRM, métricas y CSV</text>
    </g>
  </g>

  <text x="600" y="383" text-anchor="middle" fill="#a8c69a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">Si todos los permisos siguen activos, el usuario va directamente a “Mi cuenta → Descargas”.</text>
</svg>
