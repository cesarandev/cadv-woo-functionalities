<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Arquitectura de CADV Woo Functionalities</title>
  <desc id="desc">WordPress y WooCommerce alimentan los módulos de producto, marketplace, CRM y actualizaciones del plugin.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbf7"/>
      <stop offset="1" stop-color="#edf5e9"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#203d18"/>
      <stop offset="1" stop-color="#4b792e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0l10 5-10 5Z" fill="#8aa27f"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#203018" flood-opacity=".1"/>
    </filter>
  </defs>

  <rect width="1200" height="620" rx="26" fill="url(#bg)"/>
  <text x="60" y="68" fill="#1b2f16" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="800">Arquitectura funcional</text>
  <text x="60" y="98" fill="#62705d" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Una capa comercial sobre los contratos nativos de WordPress y WooCommerce.</text>

  <path d="M280 231H414" stroke="#8aa27f" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M280 331H414" stroke="#8aa27f" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M666 281H776" stroke="#8aa27f" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M666 281C720 281 718 181 776 181" fill="none" stroke="#8aa27f" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M666 281C720 281 718 381 776 381" fill="none" stroke="#8aa27f" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M666 281C720 281 718 481 776 481" fill="none" stroke="#8aa27f" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M540 384V496" stroke="#8aa27f" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <g transform="translate(60 178)">
      <rect width="220" height="106" rx="16" fill="#fff" stroke="#d9e4d5"/>
      <circle cx="36" cy="36" r="17" fill="#e9f2e5"/>
      <text x="36" y="42" text-anchor="middle" fill="#315c27" font-size="17" font-weight="900">W</text>
      <text x="65" y="40" fill="#203018" font-size="18" font-weight="800">WordPress</text>
      <text x="24" y="76" fill="#71806d" font-size="13">Usuarios · páginas · opciones</text>
    </g>
    <g transform="translate(60 300)">
      <rect width="220" height="106" rx="16" fill="#fff" stroke="#d9e4d5"/>
      <circle cx="36" cy="36" r="17" fill="#eee7f7"/>
      <text x="36" y="42" text-anchor="middle" fill="#7f54b3" font-size="14" font-weight="900">WC</text>
      <text x="65" y="40" fill="#203018" font-size="18" font-weight="800">WooCommerce</text>
      <text x="24" y="76" fill="#71806d" font-size="13">Productos · pedidos · descargas</text>
    </g>

    <g transform="translate(414 178)">
      <rect width="252" height="206" rx="22" fill="url(#hub)"/>
      <rect x="24" y="24" width="50" height="50" rx="14" fill="#9acb63"/>
      <path d="M37 54c13-1 21-8 25-20 1 13-4 23-16 28-5 1-9-2-9-8Z" fill="#173012"/>
      <text x="24" y="106" fill="#fff" font-size="21" font-weight="800">CADV Woo</text>
      <text x="24" y="132" fill="#fff" font-size="21" font-weight="800">Functionalities</text>
      <text x="24" y="165" fill="#d3e4ca" font-size="13">PHP · AJAX · shortcodes</text>
      <text x="24" y="186" fill="#d3e4ca" font-size="13">CSS responsive · JavaScript nativo</text>
    </g>

    <g transform="translate(776 128)">
      <rect width="364" height="84" rx="15" fill="#fff" stroke="#d9e4d5"/>
      <rect width="8" height="84" rx="4" fill="#4b792e"/>
      <text x="28" y="34" fill="#203018" font-size="17" font-weight="800">Producto y fichas técnicas</text>
      <text x="28" y="59" fill="#71806d" font-size="13">Botones, modal, clientes y permisos de descarga</text>
    </g>
    <g transform="translate(776 228)">
      <rect width="364" height="84" rx="15" fill="#fff" stroke="#d9e4d5"/>
      <rect width="8" height="84" rx="4" fill="#2f6e91"/>
      <text x="28" y="34" fill="#203018" font-size="17" font-weight="800">Marketplace</text>
      <text x="28" y="59" fill="#71806d" font-size="13">Líneas, búsqueda, ICA, tarjetas y carga AJAX</text>
    </g>
    <g transform="translate(776 328)">
      <rect width="364" height="84" rx="15" fill="#fff" stroke="#d9e4d5"/>
      <rect width="8" height="84" rx="4" fill="#a06b20"/>
      <text x="28" y="34" fill="#203018" font-size="17" font-weight="800">CRM y CTAs</text>
      <text x="28" y="59" fill="#71806d" font-size="13">Leads, solicitudes, estados, seguimiento y CSV</text>
    </g>
    <g transform="translate(776 428)">
      <rect width="364" height="84" rx="15" fill="#fff" stroke="#d9e4d5"/>
      <rect width="8" height="84" rx="4" fill="#7357a2"/>
      <text x="28" y="34" fill="#203018" font-size="17" font-weight="800">Actualizaciones privadas</text>
      <text x="28" y="59" fill="#71806d" font-size="13">Metadatos remotos, caché y paquetes protegidos</text>
    </g>

    <g transform="translate(356 496)">
      <rect width="368" height="78" rx="15" fill="#fff" stroke="#d9e4d5"/>
      <text x="184" y="30" text-anchor="middle" fill="#203018" font-size="16" font-weight="800">Persistencia nativa</text>
      <text x="184" y="54" text-anchor="middle" fill="#71806d" font-size="13">Options · post meta · user meta · term meta</text>
    </g>
  </g>
</svg>
